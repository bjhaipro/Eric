services:
  - type: web
    name: bjh-ai-pro-mobile
    runtime: node
    region: singapore
    plan: free
    buildCommand: cd backend && npm ci
    startCommand: node scripts/init-db.mjs && cd backend && npm start
    healthCheckPath: /api/v1/health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: bjh-ai-pro-db
          property: connectionString
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ACCESS_TOKEN_TTL
        value: 15m
      - key: REFRESH_TOKEN_TTL
        value: 7d
      - key: COOKIE_SECURE
        value: "true"

databases:
  - name: bjh-ai-pro-db
    region: singapore
    plan: free
    postgresMajorVersion: "16"
    databaseName: bjh_ai_pro
    user: bjh_ai_pro
